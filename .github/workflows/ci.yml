name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate Falco rules YAML
        run: python3 -c "import yaml; yaml.safe_load(open('falco/rules.local.yaml'))"

      - name: Validate proxy policy YAML
        run: python3 -c "import yaml; yaml.safe_load(open('proxy/policy.yaml'))"

      - name: Check .env not committed
        run: |
          if git ls-files | grep -q '^\.env$'; then
            echo "ERROR: .env is tracked by git — remove it immediately"
            exit 1
          fi

      - name: Check no secrets in diff
        run: |
          if git diff HEAD~1 2>/dev/null | grep -iE 'sk-ant-|sk-[a-zA-Z0-9]{40}|AIza|xai-' ; then
            echo "ERROR: possible API key in diff"
            exit 1
          fi
          echo "No secrets detected"

      - name: Shellcheck on test suite
        run: |
          sudo apt-get install -y shellcheck -q
          shellcheck tests/run_tests.sh agents/entrypoint.sh

  unit-proxy:
    name: Proxy addon unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install mitmproxy pyyaml pytest

      - name: Run proxy unit tests
        run: pytest tests/unit/ -v
        continue-on-error: true  # unit tests added incrementally

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy image
        run: docker build ./proxy -t leash-proxy:ci

      - name: Build agents image
        run: docker build ./agents -t leash-agents:ci
