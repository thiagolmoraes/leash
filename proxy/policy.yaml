# Proxy egress policy
# mode: enforce  → block + log anything not in allow list
# mode: observe  → log only, nothing blocked (use for initial profiling)
mode: enforce

# ignore_hosts: hosts to pass through un-intercepted (no TLS MitM). Use this
# for CLIs/hosts with certificate pinning, where decryption breaks the
# connection outright. Regexes, matched against the hostname.
# ignore_hosts:
#   - pinned-api\.example\.com

allow:
  - api.anthropic.com
  - platform.claude.com
  - statsig.anthropic.com
  - api.openai.com
  - o1.openai.com
  - generativelanguage.googleapis.com
  - oauth2.googleapis.com
  - accounts.google.com
  - cloudcode-pa.googleapis.com
  - api.x.ai
  - registry.npmjs.org
  - github.com
  - objects.githubusercontent.com
  - raw.githubusercontent.com
  - codeload.github.com
  - api.github.com
  - ocsp.digicert.com
  - ocsp.pki.goog
  - crl.pki.goog
  - pki.goog
