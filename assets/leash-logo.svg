<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0d2a24"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="lockGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a87a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Shackle / network loop -->
  <path d="M 152 205 L 152 165 A 48 48 0 0 1 248 165 L 248 205"
    fill="none" stroke="url(#chainGrad)" stroke-width="18"
    stroke-linecap="round" filter="url(#glow)"/>

  <!-- Network nodes -->
  <circle cx="152" cy="165" r="10" fill="#0d1117" stroke="#00d4aa" stroke-width="3" filter="url(#softGlow)"/>
  <circle cx="152" cy="165" r="4" fill="#00d4aa" filter="url(#softGlow)"/>
  <circle cx="248" cy="165" r="10" fill="#0d1117" stroke="#00d4aa" stroke-width="3" filter="url(#softGlow)"/>
  <circle cx="248" cy="165" r="4" fill="#00d4aa" filter="url(#softGlow)"/>
  <circle cx="200" cy="117" r="8" fill="#0d1117" stroke="#00ffcc" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="200" cy="117" r="3" fill="#00ffcc" filter="url(#glow)"/>

  <!-- Dashed connectors -->
  <line x1="200" y1="117" x2="152" y2="165" stroke="#00d4aa" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="200" y1="117" x2="248" y2="165" stroke="#00d4aa" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Lock body -->
  <rect x="130" y="195" width="140" height="110" rx="14"
    fill="#0f1f1c" stroke="#00d4aa" stroke-width="2.5" filter="url(#softGlow)"/>
  <rect x="130" y="195" width="140" height="28" rx="14" fill="#00d4aa" opacity="0.08"/>
  <line x1="144" y1="201" x2="256" y2="201" stroke="#00ffcc" stroke-width="1" opacity="0.18" stroke-linecap="round"/>

  <!-- Corner dots -->
  <circle cx="147" cy="212" r="2.5" fill="#00d4aa" opacity="0.35"/>
  <circle cx="253" cy="212" r="2.5" fill="#00d4aa" opacity="0.35"/>
  <circle cx="147" cy="288" r="2.5" fill="#00d4aa" opacity="0.35"/>
  <circle cx="253" cy="288" r="2.5" fill="#00d4aa" opacity="0.35"/>

  <!-- Keyhole -->
  <circle cx="200" cy="237" r="18" fill="#0d1117" stroke="#00d4aa" stroke-width="2"/>
  <circle cx="200" cy="237" r="4" fill="#00d4aa" filter="url(#softGlow)"/>
  <rect x="196.5" y="245" width="7" height="18" rx="3.5" fill="#00d4aa" opacity="0.85"/>

  <!-- Scan lines -->
  <line x1="148" y1="270" x2="252" y2="270" stroke="#00d4aa" stroke-width="0.8" opacity="0.2"/>
  <line x1="148" y1="282" x2="252" y2="282" stroke="#00d4aa" stroke-width="0.8" opacity="0.12"/>

  <!-- Chain links (leash) -->
  <g filter="url(#softGlow)" opacity="0.75">
    <ellipse cx="158" cy="316" rx="9" ry="5.5" fill="none" stroke="#00d4aa" stroke-width="2.2" transform="rotate(-30 158 316)"/>
    <ellipse cx="149" cy="326" rx="9" ry="5.5" fill="none" stroke="#0099cc" stroke-width="2.2" transform="rotate(-30 149 326)"/>
    <ellipse cx="140" cy="336" rx="9" ry="5.5" fill="none" stroke="#00d4aa" stroke-width="2.2" transform="rotate(-30 140 336)"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="378" text-anchor="middle"
    font-family="'Courier New', Courier, 'Lucida Console', monospace"
    font-size="32" font-weight="700" letter-spacing="10"
    fill="#ffffff" filter="url(#softGlow)">LEASH</text>
  <line x1="130" y1="385" x2="270" y2="385" stroke="#00d4aa" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <circle cx="122" cy="370" r="2.5" fill="#00d4aa" opacity="0.5"/>
  <circle cx="278" cy="370" r="2.5" fill="#00d4aa" opacity="0.5"/>
</svg>
